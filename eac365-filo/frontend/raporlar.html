<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC365 Filo - Raporlar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body class="light-theme">
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-truck-moving"></i>
                    <h1>EAC365 <span>FİLO</span></h1>
                </div>
                <div class="user-info">
                    <div class="user-details">
                        <div id="userName" class="user-name">Yükleniyor...</div>
                        <div id="userCompany" class="user-company"></div>
                    </div>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Çıkış
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <nav class="nav-menu">
        <div class="container">
            <ul>
                <li><a href="panel.html"><i class="fas fa-home"></i> Ana Panel</a></li>
                <li><a href="araclar.html"><i class="fas fa-truck"></i> Araçlar</a></li>
                <li><a href="muhasebe.html"><i class="fas fa-calculator"></i> Muhasebe</a></li>
                <li><a href="personel.html"><i class="fas fa-users"></i> Personel</a></li>
                <li><a href="raporlar.html" class="active"><i class="fas fa-chart-line"></i> Raporlar</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="container">
        <div class="dashboard-header">
            <div>
                <h2><i class="fas fa-chart-line"></i> Raporlar</h2>
                <p>Detaylı analiz ve raporlama</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="exportAllReports()">
                    <i class="fas fa-file-pdf"></i> PDF Rapor
                </button>
                <button class="btn btn-secondary" onclick="exportToExcel()">
                    <i class="fas fa-file-excel"></i> Excel
                </button>
            </div>
        </div>
        
        <!-- Rapor Tipi Seçici -->
        <div class="report-tabs">
            <button class="report-tab active" onclick="switchReport('financial')">
                <i class="fas fa-money-bill"></i> Finansal Raporlar
            </button>
            <button class="report-tab" onclick="switchReport('fleet')">
                <i class="fas fa-truck"></i> Filo Raporları
            </button>
            <button class="report-tab" onclick="switchReport('personnel')">
                <i class="fas fa-users"></i> Personel Raporları
            </button>
            <button class="report-tab" onclick="switchReport('fuel')">
                <i class="fas fa-gas-pump"></i> Yakıt Raporları
            </button>
        </div>
        
        <!-- Tarih Aralığı -->
        <div class="report-date-range">
            <div class="date-inputs">
                <div class="form-group">
                    <label>Başlangıç</label>
                    <input type="date" id="reportStartDate" class="form-control">
                </div>
                <div class="form-group">
                    <label>Bitiş</label>
                    <input type="date" id="reportEndDate" class="form-control">
                </div>
                <button class="btn btn-primary" onclick="generateReport()">Rapor Oluştur</button>
            </div>
            <div class="quick-dates">
                <button class="btn btn-sm" onclick="setReportRange('today')">Bugün</button>
                <button class="btn btn-sm" onclick="setReportRange('week')">Bu Hafta</button>
                <button class="btn btn-sm" onclick="setReportRange('month')">Bu Ay</button>
                <button class="btn btn-sm" onclick="setReportRange('quarter')">Bu Çeyrek</button>
                <button class="btn btn-sm" onclick="setReportRange('year')">Bu Yıl</button>
            </div>
        </div>
        
        <!-- Rapor İçeriği -->
        <div class="report-content" id="reportContent">
            <!-- İçerik JS ile doldurulacak -->
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>EAC365 Filo Yönetim Sistemi © 2026 | v1.0.0</p>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
